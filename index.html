<!DOCTYPE html>
<html class="staticrypt-html" lang="ja">
    <head>

        <style>
            .staticrypt-html { height: 100%; }
            .staticrypt-body { height: 100%; margin: 0; }
            .staticrypt-content {
                min-height: 100%;
                background: linear-gradient(135deg, #2a78d6 0%, #4a3aa7 100%);
                font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, sans-serif;
                -webkit-font-smoothing: antialiased;
                display: flex;
                align-items: flex-start;
                justify-content: center;
                box-sizing: border-box;
                padding: 9vh 16px 40px;
            }
            .staticrypt-form {
                background: #ffffff;
                width: 100%;
                max-width: 380px;
                border-radius: 16px;
                padding: 36px 34px 30px;
                box-shadow: 0 18px 50px rgba(10, 20, 60, 0.35);
                box-sizing: border-box;
            }
            .staticrypt-title {
                font-size: 18px;
                font-weight: 700;
                color: #0b0b0b;
                margin: 0 0 6px;
                text-align: center;
            }
            .staticrypt-instructions p.sub {
                font-size: 12.5px;
                color: #52514e;
                margin: 0 0 22px;
                text-align: center;
            }
            .field-label {
                display: block;
                font-size: 12px;
                font-weight: 600;
                color: #52514e;
                margin: 0 0 6px 2px;
                text-align: left;
            }
            .field-wrap {
                position: relative;
                background: #f4f4f2;
                border: 1px solid rgba(11, 11, 11, 0.08);
                border-radius: 10px;
                margin-bottom: 16px;
            }
            .field-wrap input[type="email"],
            .field-wrap input[type="password"],
            .field-wrap input[type="text"] {
                background: transparent;
                border: 0;
                box-sizing: border-box;
                font-size: 14px;
                outline: 0;
                padding: 13px 42px 13px 14px;
                width: 100%;
                font-family: inherit;
            }
            .field-wrap:focus-within {
                border-color: #2a78d6;
                box-shadow: 0 0 0 3px rgba(42, 120, 214, 0.15);
            }
            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 55%;
                position: absolute;
                right: 12px;
                top: 50%;
                transform: translateY(-50%);
            }
            .staticrypt-error {
                display: none;
                background: rgba(208, 59, 59, 0.09);
                color: #b32c2c;
                font-size: 12.5px;
                font-weight: 600;
                border-radius: 9px;
                padding: 9px 12px;
                margin: 0 0 14px;
                text-align: left;
            }
            .staticrypt-error.show { display: block; }
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 12.5px;
                color: #52514e;
                margin: 2px 0 16px;
            }
            .staticrypt-decrypt-button {
                outline: 0;
                background: linear-gradient(135deg, #2a78d6, #4a3aa7);
                width: 100%;
                border: 0;
                border-radius: 10px;
                padding: 13px;
                color: #ffffff;
                font-size: 14px;
                font-weight: 700;
                font-family: inherit;
                cursor: pointer;
            }
            .staticrypt-decrypt-button:hover { filter: brightness(1.07); }
            .staticrypt-foot {
                font-size: 11px;
                color: #898781;
                text-align: center;
                margin: 16px 0 0;
            }
            .hidden { display: none !important; }
            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid gray;
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border { 100% { transform: rotate(360deg); } }
            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .field-wrap input { font-size: 16px; }
            }
        </style>
    </head>
